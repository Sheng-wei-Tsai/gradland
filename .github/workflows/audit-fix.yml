name: Weekly Audit Fix

# Keeps the deploy gate green. New npm advisories make `npm audit
# --audit-level=moderate` fail the required "Security & Build Check" on every
# push to main (content bots push twice daily) until someone runs `npm audit
# fix`. This workflow runs the fix weekly, verifies it, and opens a PR.

on:
  schedule:
    - cron: '0 18 * * 0'   # Monday 4am AEST (UTC+10)
  workflow_dispatch: {}    # manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: audit-fix
  cancel-in-progress: false

jobs:
  audit-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'   # ships npm 10 — lockfile must be regenerated by npm 10 to pass check-lockfile-sync.sh
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit fix
        run: npm audit fix || true   # non-semver-fixable advisories need a human; still open PR for the rest

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No audit fixes available — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify fix (lockfile sync + audit + tests)
        if: steps.diff.outputs.changed == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-ci
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-ci
          NEXT_PUBLIC_APP_URL: https://gradland.au
        run: |
          sh scripts/check-lockfile-sync.sh
          npm audit --audit-level=moderate
          npm test

      # GITHUB_TOKEN-created PRs don't trigger workflows, so the required check
      # would never run. Mint an app token when the bot app is configured
      # (same app as daily-posts PR mode); otherwise fall back to GITHUB_TOKEN
      # and note the close/reopen workaround in the PR body.
      - name: Mint bot token
        if: ${{ steps.diff.outputs.changed == 'true' && secrets.BOT_APP_ID != '' }}
        id: bot
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Open PR with fixes
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="fix/audit-$(date -u +%Y%m%d)"
          git config user.name "gradland-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "fix(deps): weekly npm audit fix

- Automated by .github/workflows/audit-fix.yml
- Verified in-workflow: lockfile sync, audit clean, test suite"
          git push -f origin "$BRANCH"
          gh pr create \
            --title "fix(deps): weekly npm audit fix $(date -u +%Y-%m-%d)" \
            --body "Automated weekly \`npm audit fix\`. Verified before opening: \`check-lockfile-sync.sh\`, \`npm audit --audit-level=moderate\` clean, test suite green.

If the required **Security & Build Check** never starts (PR opened with \`GITHUB_TOKEN\`), close and reopen this PR to trigger it." \
            || echo "PR may already exist for $BRANCH — skipping."
