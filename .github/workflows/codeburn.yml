name: Weekly AI Usage Report (CodeBurn)

# Runs every Monday at 09:00 AEST (23:00 UTC Sunday) and posts a GitHub Issue
# summarising the past week's Claude Code token spend across all projects.
# Also runnable manually for an on-demand snapshot.

on:
  schedule:
    - cron: '0 23 * * 0'   # 09:00 Monday AEST (UTC+10)
  workflow_dispatch:
    inputs:
      period:
        description: 'Report period'
        default: 'week'
        type: choice
        options: [today, week, month, all]

permissions:
  issues: write

jobs:
  report:
    name: CodeBurn Weekly Report
    runs-on: ubuntu-latest

    steps:
      - name: Generate CodeBurn report
        id: report
        run: |
          PERIOD="${{ inputs.period || 'week' }}"
          echo "Running codeburn for period: ${PERIOD}"
          npx --yes codeburn report --period "${PERIOD}" --format json > /tmp/codeburn.json 2>/dev/null || echo '{}' > /tmp/codeburn.json
          npx --yes codeburn report --period "${PERIOD}" > /tmp/codeburn.txt 2>/dev/null || echo 'No data' > /tmp/codeburn.txt
          cat /tmp/codeburn.txt

      - name: Open GitHub Issue with report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          PERIOD="${{ inputs.period || 'week' }}"
          WEEK=$(date -u +%Y-W%V)
          DATE=$(date -u +%Y-%m-%d)

          python3 - << 'PYEOF'
          import os, subprocess, json

          period = os.environ.get('PERIOD', 'week')
          week   = os.environ.get('WEEK', '')
          date   = os.environ.get('DATE', '')

          try:
              report_text = open('/tmp/codeburn.txt').read()
          except Exception:
              report_text = 'No report data available.'

          try:
              data = json.load(open('/tmp/codeburn.json'))
              overview = data.get('overview', {})
              cost  = overview.get('cost')
              calls = overview.get('calls', 0)
              cache_hit = overview.get('cacheHitPercent', 0)
              cost_str = f'${cost:.2f}' if cost else 'n/a (Pro quota)'
          except Exception:
              cost_str = 'n/a'
              calls = 0
              cache_hit = 0

          b3 = '`' * 3
          lines = [
              f'## CodeBurn — AI Usage Report ({period} ending {date})', '',
              f'| Metric | Value |',
              f'|--------|-------|',
              f'| Period | {period} |',
              f'| Est. cost | {cost_str} |',
              f'| API calls | {calls:,} |',
              f'| Cache hit | {cache_hit:.1f}% |', '',
              '### Full Report', '',
              f'{b3}',
              report_text[:8000],
              f'{b3}', '',
              '---',
              f'*Generated by [CodeBurn](https://github.com/getagentseal/codeburn) via `codeburn.yml`*',
          ]

          with open('/tmp/issue_body.txt', 'w') as f:
              f.write('\n'.join(lines))

          title = f'[CodeBurn] AI usage report — {period} ({date})'
          subprocess.run([
              'gh', 'issue', 'create',
              '--repo', os.environ['REPO'],
              '--title', title,
              '--label', 'codeburn',
              '--body-file', '/tmp/issue_body.txt',
          ])
          PYEOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERIOD: ${{ inputs.period || 'week' }}
          WEEK: ${{ env.WEEK }}
          DATE: ${{ env.DATE }}
