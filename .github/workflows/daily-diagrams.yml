name: Daily Diagrams

# Generates 4 Mermaid system-design diagrams per day using Claude Haiku.
# Topics from ByteByteGoHq/system-design-101 (MIT) — 30-topic pool cycles.
# Diagrams land in content/diagrams/ as markdown files.
#
# Cron: 23:00 UTC (9am AEST) — own quota window, 6h after visa-news/ai-news.

on:
  schedule:
    - cron: '0 23 * * *'   # 9am AEST — own quota window
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagrams:
    name: Generate Daily Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Generate diagrams
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          npx tsx scripts/fetch-diagrams.ts 2>&1 | tee diagrams.log
          EXIT=${PIPESTATUS[0]}
          sed -i 's/\x1b\[[0-9;]*[mGKHFJSTsu]//g' diagrams.log
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" diagrams.log; then
            echo "::warning::Claude quota hit — diagrams will retry in next window"
            exit 0
          fi
          exit $EXIT
