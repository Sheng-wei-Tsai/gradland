name: Daily Posts

# Daily content pipelines (digest, githot, ai-news, visa-news).
#
# All jobs authenticate to Claude via CLAUDE_CODE_OAUTH_TOKEN (Claude Code Pro
# subscription). Scripts shell out to the `claude` CLI through scripts/llm-claude.ts.
#
# All four content jobs fire together at 04:30 AEST (18:30 UTC). The blog
# `post` job lives in idle-posts.yml on the same schedule so the entire daily
# content batch lands in one quota window (~25 Sonnet calls total).
#
# Fallback: if Claude Pro quota is exhausted mid-run, scripts/llm-claude.ts
# automatically falls back to the GitHub Models API (Copilot Pro+ rate
# limit) using GH_MODELS_TOKEN. Requires `permissions: models: read`.

on:
  schedule:
    - cron: '30 18 * * *'   # 04:30 AEST — daily content batch
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  ai-news:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 18 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Run AI News
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          npx tsx scripts/fetch-ai-news.ts 2>&1 | tee ai-news.log
          EXIT=${PIPESTATUS[0]}
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" ai-news.log; then
            echo "::warning::Claude quota hit — ai-news will retry in next window"
            exit 0
          fi
          exit $EXIT

  visa-news:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 18 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Run Visa News
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          npx tsx scripts/fetch-visa-news.ts 2>&1 | tee visa-news.log
          EXIT=${PIPESTATUS[0]}
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" visa-news.log; then
            echo "::warning::Claude quota hit — visa-news will retry in next window"
            exit 0
          fi
          exit $EXIT

  githot:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 18 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Run GitHub Hot
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          npx tsx scripts/run-githot.ts 2>&1 | tee githot.log
          EXIT=${PIPESTATUS[0]}
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" githot.log; then
            echo "::warning::Claude quota hit — githot will retry in next window"
            exit 0
          fi
          exit $EXIT

  digest:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Run AI Digest
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          npx tsx scripts/run-digest.ts 2>&1 | tee digest.log
          EXIT=${PIPESTATUS[0]}
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" digest.log; then
            echo "::warning::Claude quota hit — digest will retry in next window"
            exit 0
          fi
          exit $EXIT
