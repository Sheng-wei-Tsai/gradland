name: Daily Claude Code News

# Pulls latest Claude / Anthropic announcements + new Claude Code docs pages
# from anthropic.com/news (HTML scrape), anthropic.com/rss.xml, and
# code.claude.com sitemap diff. Output: content/claude-code/YYYY-MM-DD-*.md.
# Surfaces at /posts/claude-code.
#
# Cron: 22:00 UTC — own slot between idle-posts (18:30) and diagrams (23:00).

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  claude-news:
    name: Fetch Claude / Anthropic news
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "gradland-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Fetch news
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          npx tsx scripts/fetch-claude-news.ts 2>&1 | tee claude-news.log
          EXIT=${PIPESTATUS[0]}
          sed -i 's/\x1b\[[0-9;]*[mGKHFJSTsu]//g' claude-news.log
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" claude-news.log; then
            echo "::warning::Claude quota hit — news will retry in next window"
            exit 0
          fi
          exit $EXIT
