name: Daily Career Edge

# Fires daily at 02:00 AEST (16:00 UTC) own quota window, before the
# 18:30 UTC daily-posts batch. Reads .queue.md, picks first un-done topic,
# researches and writes a 1500-2000 word article, commits + pushes to main.

on:
  schedule:
    - cron: '0 16 * * *'
  repository_dispatch:
    types: [career-edge]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  career-edge:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Quick guard skip if already posted today
        id: guard
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "today=${TODAY}" >> $GITHUB_OUTPUT
          if ls content/career-edge/${TODAY}-*.md 2>/dev/null | grep -q .; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Career Edge for ${TODAY} already exists, skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip == 'false'
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
        if: steps.guard.outputs.skip == 'false'

      - name: Install Claude Code CLI
        if: steps.guard.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        if: steps.guard.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Generate Career Edge article
        if: steps.guard.outputs.skip == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          claude \
            --dangerously-skip-permissions \
            --model claude-sonnet-4-6 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch" \
            -p "$(cat .github/prompts/career-edge.md)" 2>&1 | tee career-edge.log
          EXIT=${PIPESTATUS[0]}
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" career-edge.log; then
            echo "::warning::Claude quota hit, career-edge will retry in next window"
            exit 0
          fi
          exit $EXIT
