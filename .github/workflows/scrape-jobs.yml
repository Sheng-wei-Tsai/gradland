name: Scrape AU IT Jobs

on:
  schedule:
    - cron: '0 20 * * *'  # 6am AEST (UTC+10) daily
  workflow_dispatch: {}    # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # Apify actors can take up to 10 min each

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape AU IT jobs (Greenhouse + Lever + Workday + Ashby + Smartrec + APS + Hatch + Jora + ACS + 80kh)
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # APIFY is now opt-in fallback only. Free direct ATS APIs cover Workday + Ashby.
          # To re-enable as fallback (e.g. if a Workday tenant blocks direct fetch):
          #   APIFY_API_KEY:        ${{ secrets.APIFY_API_KEY }}
          #   USE_APIFY_FALLBACK:   'true'
        run: npx tsx scripts/scrape-au-jobs.ts
