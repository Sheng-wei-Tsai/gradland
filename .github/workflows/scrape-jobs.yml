name: Scrape AU IT Jobs

on:
  schedule:
    - cron: '0 20 * * *'  # 6am AEST (UTC+10)
  workflow_dispatch: {}    # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape AU IT jobs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        # Run tsx directly — no --env-file flag, secrets are already in env above.
        # npm run scrape:jobs uses --env-file=.env.local which hard-fails (exit 9)
        # in Node 22 when the file doesn't exist on the CI runner.
        run: npx tsx scripts/scrape-au-jobs.ts
